# Render Blueprint — provisions the web app + Postgres + Redis with HTTPS.
# Deploy: Render Dashboard -> New -> Blueprint -> pick this repo.
# After the first deploy, open a Shell on the web service and run:
#     python init_db.py        (create tables)
#     python seed.py           (optional demo data)

databases:
  - name: pantrypet-db
    plan: free
    databaseName: pantrypet
    user: pantrypet

services:
  - type: redis
    name: pantrypet-redis
    plan: free
    ipAllowList: []          # internal connections only

  - type: web
    name: pantrypet
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /login
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pantrypet-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: pantrypet-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true     # Render generates a strong random value
      - key: GOOGLE_API_KEY
        sync: false             # set this manually in the dashboard (secret)
      - key: DEBUG
        value: "false"
