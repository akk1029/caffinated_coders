# Render Blueprint — provisions the web app + Postgres + Redis with HTTPS.
# Deploy: Render Dashboard -> New -> Blueprint -> pick this repo.
# Tables auto-create on startup (AUTO_INIT_DB=true), so no shell step is needed.
# Just register an account at /register after the first deploy.

databases:
  - name: pantrypet-db
    plan: free
    databaseName: pantrypet
    user: pantrypet

services:
  - type: redis
    name: pantrypet-redis
    plan: free
    ipAllowList: []          # internal connections only

  - type: web
    name: pantrypet
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /login
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pantrypet-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: pantrypet-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true     # Render generates a strong random value
      - key: GOOGLE_API_KEY
        sync: false             # optional — only if you have Google Vision billing
      - key: OCR_SPACE_API_KEY
        sync: false             # paste your free ocr.space key in the dashboard
      - key: DEBUG
        value: "false"
