version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: pantrypet
      POSTGRES_USER: pantrypet
      POSTGRES_PASSWORD: pantrypet123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://pantrypet:pantrypet123@db/pantrypet
      SECRET_KEY: dev-secret-key-change-in-production
      REDIS_URL: redis://redis:6379/0
      DEBUG: "true"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - ${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:/gcp-key.json:ro
    env_file:
      - ./backend/.env

  celery-worker:
    build: ./backend
    command: celery -A celery_app.celery worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://pantrypet:pantrypet123@db/pantrypet
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

  celery-beat:
    build: ./backend
    command: celery -A celery_app.celery beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://pantrypet:pantrypet123@db/pantrypet
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
