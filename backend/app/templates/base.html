<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4caf50">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PantryPet">
  <link rel="manifest" href="/static/manifest.json">

  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <title>{% block title %}PantryPet{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <span class="header-logo">🌿 PantryPet</span>
    <div class="header-actions">
      <span id="tier-badge" class="badge"></span>
      <button id="logout-btn" class="btn-icon" title="Logout">⏏</button>
    </div>
  </div>
</header>

<main class="main-content">
  {% block content %}{% endblock %}
</main>

<nav class="bottom-nav">
  <a href="/dashboard"   class="nav-item" data-page="dashboard">  <span class="nav-icon">🏠</span><span>Home</span>    </a>
  <a href="/inventory"   class="nav-item" data-page="inventory">  <span class="nav-icon">🧺</span><span>Pantry</span>  </a>
  <a href="/recipes"     class="nav-item" data-page="recipes">    <span class="nav-icon">🍳</span><span>Recipes</span> </a>
  <a href="/pet"         class="nav-item" data-page="pet">        <span class="nav-icon">🐾</span><span>Pet</span>     </a>
  <a href="/leaderboard" class="nav-item" data-page="leaderboard"><span class="nav-icon">🏆</span><span>Rank</span>    </a>
</nav>

<div id="toast-container"></div>
<script src="/static/app.js"></script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
    .then(() => console.log('Service Worker registered successfully'))
    .catch(err => console.error('Service Worker registration failed:', err)); 
  }
</script>
{% block scripts %}{% endblock %}
</body>
</html>
