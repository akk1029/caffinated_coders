<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4caf50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/static/manifest.json">
  <title>Sign In · PantryPet</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="auth-wrap">
  <p class="auth-logo">🌿 PantryPet</p>
  <p class="auth-tagline">Keep your pantry fresh. Keep your pet happy.</p>

  <div class="auth-card">
    <h2 class="auth-title">Welcome back</h2>
    <p id="success-msg" class="success-msg hidden">Account created! Sign in below.</p>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input id="email" class="form-input" type="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" class="form-input" type="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <p id="err" class="error-msg hidden"></p>
      <button id="submit-btn" class="btn btn-primary btn-full mt-8" type="submit">Sign In</button>
    </form>

    <p class="auth-footer">New here? <a href="/register" class="auth-link">Create an account</a></p>
  </div>
</div>
<div id="toast-container"></div>
<script src="/static/app.js"></script>
</body>
</html>
